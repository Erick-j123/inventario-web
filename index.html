<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SISTEMA DE INVENTARIO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{font-family:Arial;margin:0;background:#e5e7eb}
header{background:linear-gradient(90deg,#facc15,#1d4ed8);color:#fff;padding:20px;border-radius:15px;margin:10px}
.header-content{display:flex;justify-content:space-between;align-items:center}
.header-content img{height:60px;background:#fff;border-radius:10px;padding:5px}
.header-text{text-align:center;flex:1}
.tabs{display:flex;justify-content:space-around;margin:15px}
.tabs button{background:#1d4ed8;color:#fff;border:none;padding:12px 30px;border-radius:10px;font-weight:bold;cursor:pointer}
.container{background:#f3f4f6;margin:20px;padding:20px;border-radius:15px}
input,select{padding:10px;margin:5px;border-radius:8px;border:1px solid #ccc}
.actions button{background:#1d4ed8;color:#fff;border:none;padding:10px 15px;margin:5px;border-radius:8px;cursor:pointer}
th{background:#facc15}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
</style>
</head>

<body>
<header>
<div class="header-content">
<img src="IMG_3638.jpg">
<div class="header-text">
<h2>SISTEMA DE INVENTARIO</h2>
<h3>INVENTARIO DE MATERIALES Y HERRAMIENTAS</h3>
</div>
<img src="IMG_3516.jpg">
</div>
</header>

<div class="tabs">
<button onclick="cambiarBodega('checc')">BODEGA CHECC</button>
<button onclick="cambiarBodega('adinsa')">BODEGA ADINSA</button>
<button onclick="cambiarBodega('acecorsa')">BODEGA ACECORSA</button>
</div>

<div class="container">
<h2 id="tituloBodega">CHECC</h2>
<input type="text" placeholder="Buscar..." id="buscar" onkeyup="escuchar()">
<br>
<input type="date" id="fecha">
<select id="tipo"><option>Material</option><option>Herramienta</option></select>
<input placeholder="Nombre" id="nombre">
<select id="mov"><option>Ingreso</option><option>Salida</option></select>
<input type="number" id="cant" placeholder="Cantidad">
<input placeholder="Proyecto" id="proyecto">
<input placeholder="Responsable" id="responsable">
<div class="actions">
<button onclick="guardar()">Guardar</button>
<button onclick="limpiar()">Cancelar</button>
</div>

<table>
<thead>
<tr>
<th>Fecha</th><th>Tipo</th><th>Nombre</th><th>Mov</th><th>Cant</th><th>Proyecto</th><th>Resp</th><th>Stock</th><th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>
var firebaseConfig={apiKey:"AIzaSyDDUb0tp0llWLwZ875YgGc_7hMCP-KHKXk",authDomain:"inventario-94526.firebaseapp.com",databaseURL:"https://inventario-94526-default-rtdb.firebaseio.com",projectId:"inventario-94526"};
firebase.initializeApp(firebaseConfig);
var db=firebase.database();

var bodega='checc';
var refActual=null;
var idEditando=null;

function cambiarBodega(b){bodega=b;document.getElementById('tituloBodega').innerText=b.toUpperCase();escuchar();}

function guardar(){
var data={fecha:fecha.value,tipo:tipo.value,nombre:nombre.value,mov:mov.value,cant:Number(cant.value),proyecto:proyecto.value,responsable:responsable.value};
if(!data.nombre||!data.cant)return alert('Completa campos');

if(idEditando){
  db.ref(bodega+'/'+idEditando).set(data);
  idEditando=null;
}else{
  db.ref(bodega).push(data);
}

limpiar();
}

function limpiar(){nombre.value='';cant.value='';}

function eliminar(id){if(confirm('Eliminar registro?'))db.ref(bodega+'/'+id).remove();}

function editar(id){
  db.ref(bodega+'/'+id).once('value',function(snap){
    var data=snap.val();
    fecha.value=data.fecha;
    tipo.value=data.tipo;
    nombre.value=data.nombre;
    mov.value=data.mov;
    cant.value=data.cant;
    proyecto.value=data.proyecto;
    responsable.value=data.responsable;
    idEditando=id;
  });
}

function escuchar(){
if(refActual){refActual.off();}
refActual=db.ref(bodega);

refActual.on('value',function(snap){
var datos=snap.val()||{};
var keys=Object.keys(datos);
var arr=Object.values(datos);

var filtro=buscar.value.toLowerCase();

var tabla=document.getElementById('tabla');
tabla.innerHTML='';

var stockGlobal={};

for(var i=0;i<arr.length;i++){
var item=arr[i];

if(!item.nombre.toLowerCase().includes(filtro)) continue;

if(!stockGlobal[item.nombre]) stockGlobal[item.nombre]=0;

if(item.mov==='Ingreso'){
  stockGlobal[item.nombre]+=item.cant;
}else{
  if(stockGlobal[item.nombre]>=item.cant){
    stockGlobal[item.nombre]-=item.cant;
  }
}

var stock=stockGlobal[item.nombre];
var id=keys[i];

var color = stock <= 4 ? 'red' : 'black';

var fila='<tr>'+
'<td>'+item.fecha+'</td>'+
'<td>'+item.tipo+'</td>'+
'<td>'+item.nombre+'</td>'+
'<td>'+item.mov+'</td>'+
'<td>'+item.cant+'</td>'+
'<td>'+item.proyecto+'</td>'+
'<td>'+item.responsable+'</td>'+
'<td style="font-weight:bold;color:'+color+'">'+stock+'</td>'+
'<td>'+
'<button onclick="editar(\''+id+'\')">Editar</button><br>'+
'<button onclick="eliminar(\''+id+'\')">Eliminar</button>'+
'</td>'+
'</tr>';

tabla.innerHTML+=fila;
}
});
}

escuchar();
</script>
</body>
</html>
